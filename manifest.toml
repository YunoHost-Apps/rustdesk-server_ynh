#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "rustdesk-server"
name = "RustDesk Server"
description.en = "Remote control alternative for self-hosting"
description.fr = "Alternative de contrôle à distance pour l'auto-hébergement"

version = "1.1.16~ynh1"

maintainers = []

[upstream]
license = "AGPL-3.0"
website = "https://rustdesk.com/"
admindoc = "https://rustdesk.com/docs/en/"
code = "https://github.com/rustdesk/rustdesk-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

[resources]

    [resources.sources]

        [resources.sources.main]
        amd64.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.16/rustdesk-server-linux-amd64.zip"
        amd64.sha256 = "0565c41affe6c3f409b0bddfaf5a24ccbf3f64f5f8e3fec250b69a0d5f6bdbcf"
        i386.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.16/rustdesk-server-linux-i386.zip"
        i386.sha256 = "a10d2db36ceabec730ea2458dc0466b9fb46eda3f2ee90ab29a0bff8f92a7c22"
        arm64.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.16/rustdesk-server-linux-arm64v8.zip"
        arm64.sha256 = "6a4ae3c5ca257a4278ded72fd17eb2ca4eeb0356a5425e63a3e7fcb0ec6c155c"
        armhf.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.16/rustdesk-server-linux-armv7.zip"
        armhf.sha256 = "2e832e901680bc4eb8d5d17df867e2bc9731c0bdf064b27c35084494fc279be2"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "rustdesk-server-linux-amd64.zip"
        autoupdate.asset.i386 = "rustdesk-server-linux-i386.zip"
        autoupdate.asset.arm64 = "rustdesk-server-linux-arm64v8.zip"
        autoupdate.asset.armhf = "rustdesk-server-linux-armv7.zip"

[resources.system_user]

[resources.install_dir]

[resources.permissions]
main.url = "/"
main.show_tile = false
main.allowed = "visitors"

[resources.ports]
#api.default = 21114
hbbs.default = 21115
hbbs.exposed = "TCP"
hbbs.fixed = true
hbbsbis.default = 21116
hbbsbis.exposed = "Both"
hbbsbis.fixed = true
hbbster.default = 21118
hbbster.exposed = "TCP"
hbbster.fixed = true
hbbr.default = 21117
hbbr.exposed = "TCP"
hbbr.fixed = true
hbbrbis.default = 21119
hbbrbis.exposed = "TCP"
hbbrbis.fixed = true

[resources.apt]
packages = "sqlite3"
