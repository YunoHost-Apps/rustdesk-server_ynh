#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "rustdesk-server"
name = "RustDesk Server"
description.en = "Remote control alternative for self-hosting"
description.fr = "Alternative de contrôle à distance pour l'auto-hébergement"

version = "1.1.15~ynh1"

maintainers = []

[upstream]
license = "AGPL-3.0"
website = "https://rustdesk.com/"
admindoc = "https://rustdesk.com/docs/en/"
code = "https://github.com/rustdesk/rustdesk-server"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = "not_relevant"
sso = "not_relevant"

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

[resources]

    [resources.sources]

        [resources.sources.main]
        amd64.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-amd64.zip"
        amd64.sha256 = "c553972fd844c0224bc18eb3776f48ee5e018c6d4748729e1cfb14d32a46b394"
        i386.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-i386.zip"
        i386.sha256 = "7f9b377146d0da2039134fa9c2a5f533ab8ceee5a3fc5ef08aac6b154c3218f7"
        arm64.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-arm64v8.zip"
        arm64.sha256 = "4998dd6d32431f9aaf5841663339793bc154d7152313e128832d6b610580abe4"
        armhf.url = "https://github.com/rustdesk/rustdesk-server/releases/download/1.1.15/rustdesk-server-linux-armv7.zip"
        armhf.sha256 = "a1f977d6eb9691a4bb414e1cefe63239d7ee582367b03dd17c29d298a41e2051"

        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "rustdesk-server-linux-amd64.zip"
        autoupdate.asset.i386 = "rustdesk-server-linux-i386.zip"
        autoupdate.asset.arm64 = "rustdesk-server-linux-arm64v8.zip"
        autoupdate.asset.armhf = "rustdesk-server-linux-armv7.zip"

[resources.system_user]

[resources.install_dir]

[resources.permissions]
main.url = "/"
main.show_tile = false
main.allowed = "visitors"

[resources.ports]
#api.default = 21114
hbbs.default = 21115
hbbs.exposed = "TCP"
hbbs.fixed = true
hbbsbis.default = 21116
hbbsbis.exposed = "Both"
hbbsbis.fixed = true
hbbster.default = 21118
hbbster.exposed = "TCP"
hbbster.fixed = true
hbbr.default = 21117
hbbr.exposed = "TCP"
hbbr.fixed = true
hbbrbis.default = 21119
hbbrbis.exposed = "TCP"
hbbrbis.fixed = true

[resources.apt]
packages = "sqlite3"
